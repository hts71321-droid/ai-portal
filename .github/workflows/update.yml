name: Update AI Portal

on:
  schedule:
    # 毎日 00:00 UTC = 日本時間 朝9:00（このときだけメール通知も送信）
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      send_mail:
        description: "メール通知も送信する"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build site & send mail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          SEND_MAIL: ${{ github.event_name == 'schedule' || inputs.send_mail == true }}
        run: npm run build

      - name: Commit & push updated site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --quiet --cached || git commit -m "chore: update AI portal ($(date +'%Y-%m-%d %H:%M'))"
          git push
